databases:
  - name: kurdish-learning-db
    plan: free
    databaseName: kurdish_learning
    user: kurdish_user

services:
  - type: web
    name: kurdish-learning-api
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn kurdish_learning.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: kurdish_learning.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kurdish-learning-db
          property: connectionURI
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://kurdi-ch.vercel.app,https://kurdi.ch
      - key: STRIPE_SECRET_KEY
        value: sk_test_51TBfCxHW7iQY6Drzpw1oXMOtQ9VdbTrOLjMZBwsVTuYJiNPDYUzBAbyHSlCfMXswMhThworMXtweXyih5q74Ov8000FIUPFEPZ
      - key: STRIPE_WEBHOOK_SECRET
        value: ""
